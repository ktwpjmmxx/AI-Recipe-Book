[tool.ruff]
target-version = "py312"
line-length = 100
exclude = ["migrations", "__pycache__", ".venv", "venv"]

[tool.ruff.lint]
select = ["E", "F", "W"]
# 以下は既存コードに残っている「動作には影響しないスタイル上の指摘」のみを許容している。
# 新規に追加するコードに対しても甘くする意図はなく、既存資産を無断で書き換えないための
# 暫定措置。将来的にコード整理のタイミングで解消し、この ignore は空にするのが望ましい。
ignore = [
    "E701", # 1行に複数のステートメント (if x: y) — services/ai/*_client.py に複数箇所あり
    "E702", # 1行に複数のステートメント (; 区切り)
    "E401", # 1行に複数の import
    "E712", # `== True` / `== False` の比較
    "E501", # 行長制限 — 日本語のAIプロンプトテンプレート文字列は意図的に長い行が多く、
            # 折り返すとかえって可読性が落ちるため対象外とする
]

[tool.ruff.lint.per-file-ignores]
# 既存の未使用import。1行削除するだけで解消できる軽微なものだが、
# 無断でアプリ本体を書き換えないため、対応要否をユーザーに確認中のため一時的に許容。
"routers/recipes.py" = ["F401"]
"services/ai/gemini_client.py" = ["F401"]
